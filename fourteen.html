<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>grit - 12</title>
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=https://utsavgwa.github.io/" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faster+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ff414e;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;

            background: var(--bg-color);
            color: var(--text-color);

            font-family: "Faster One", system-ui;
            text-align: center;

            overflow: hidden;
        }

        #word {
            white-space: nowrap;
            line-height: 0.9;
            font-size: 10px;

        }
    </style>
</head>

<body onclick="goFullScreen()" ondblclick="exitFullScreen()">
    <div id="word"> run </div>
    <script>
        function goFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            }
        }
        function exitFullScreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        const word = document.getElementById("word");

        function fitText() {

            const PADDING = 0.10;

            const maxWidth = window.innerWidth * (1 - PADDING * 2);
            const maxHeight = window.innerHeight * (1 - PADDING * 2);

            word.style.fontSize = "100px";

            const rect = word.getBoundingClientRect();

            const scaleX = maxWidth / rect.width;
            const scaleY = maxHeight / rect.height;

            const scale = Math.min(scaleX, scaleY);

            word.style.fontSize = `${100 * scale}px`;
        }

        fitText();
        window.addEventListener("resize", fitText);    </script>
</body>

</html>
